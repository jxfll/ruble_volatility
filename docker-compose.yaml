services:
  db:
    image: postgres:15-alpine
    container_name: ruble_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ruble_web
    # The comman waits for the DB healthcheck, then migrates and seeds
    command: >
      sh -c "python manage.py migrate --noinput && 
             python manage.py seed_history &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
      - /code/node_modules
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_NAME=postgres
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-in
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "test", "analytics.tests"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
