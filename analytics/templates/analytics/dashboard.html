{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rouble Volatility Analytics</title>
    <script src="{% static 'chart.js/dist/chart.umd.js' %}"></script>
    <script src="{% static 'chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js' %}"></script>
    <script src="{% static 'hammerjs/hammer.min.js' %}"></script>
    <script src="{% static 'chartjs-plugin-zoom/dist/chartjs-plugin-zoom.min.js' %}"></script>
    <script src="{% static 'analytics/js/dashboard.js' %}"></script>
    <style>
        body { background: #fafafa; font-family: sans-serif; margin: 40px; }
        .chart-frame { background: white; padding: 20px; border: 1px solid #ddd; height: 600px; }
    </style>
</head>
<body>
    <h1>Rouble Hyperinflation Modeling (1917–1922)</h1>
    <div class="chart-frame">
        <canvas id="roubleChart"></canvas>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initRoubleChart("{% url 'analytics:chart_api' %}");
        });
    </script>
</body>
</html>
